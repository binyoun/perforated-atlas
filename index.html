<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perforated Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      color: #7A6A48;
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      padding: 0;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 3.5rem 2rem;
    }

    header {
      margin-bottom: 3rem;
      padding-bottom: 0;
      border: none;
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8B7A54;
      margin: 0;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #5A4A30;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }

    .input-area {
      margin-bottom: 2rem;
    }

    .place-fields {
      display: flex;
      gap: 3rem;
      margin-bottom: 3rem;
    }
    .place-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .place-field label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6A5A38;
    }
    .place-field input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #3E3018;
      color: #C8B070;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      padding: 0.25rem 0;
      outline: none;
      width: 180px;
      caret-color: #8B6914;
    }
    .place-field input:focus {
      border-bottom-color: #7A6030;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .word-box {
      background: rgba(255,255,255,0.018);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 1px;
      color: #C8B070;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 300;
      padding: 0.6rem 0.75rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    .word-box::placeholder {
      color: #3A3020;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
    .word-box:focus {
      border-color: rgba(160,110,30,0.35);
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.4), 0 0 8px rgba(140,100,20,0.06);
    }
    .word-box.filled {
      border-color: rgba(140,100,20,0.2);
    }

    .lang-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: #5A4A2A;
      letter-spacing: 0.04em;
      margin-bottom: 1.5rem;
    }

    #translate-btn {
      background: none;
      border: 1px solid #453818;
      color: #7A6A3A;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.8rem;
      cursor: pointer;
      border-radius: 1px;
      transition: border-color 0.2s, color 0.2s;
    }
    #translate-btn:not(:disabled):hover {
      border-color: #8B7040;
      color: #B09050;
    }
    #translate-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Word grid dissolve state */
    .word-grid.dissolving .word-box {
      opacity: 0;
      transform: translateY(-3px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .place-fields.dissolving {
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    .lang-hint.dissolving,
    #translate-btn.dissolving {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .apparatus-area {
      position: relative;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .apparatus-area.visible {
      opacity: 1;
    }
    .apparatus-area::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 60% 100% at 32% 50%, transparent 30%, rgba(11,11,11,0.7) 100%);
      /* spotlight at read head position (32%), dark at edges */
    }

    #strip-canvas {
      width: 100%;
      height: 400px;
      display: block;
      border: none;
      border-top: 1px solid #151208;
      border-bottom: 1px solid #151208;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1.2rem;
    }

    .brass-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #C09830, #5A3C08);
      border: 1px solid rgba(180,130,20,0.4);
      box-shadow: 0 0 16px rgba(140,100,20,0.12), inset 0 1px 0 rgba(255,220,100,0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s;
      padding: 0;
    }
    .brass-btn:not(:disabled):hover {
      box-shadow: 0 0 24px rgba(180,130,20,0.25), inset 0 1px 0 rgba(255,220,100,0.2);
    }
    .brass-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }
    .brass-btn svg {
      width: 14px;
      height: 14px;
      fill: #F0DDA0;
    }

    .strip-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: #6A5A3A;
      letter-spacing: 0.05em;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Perforated Atlas</h1>
      <p class="subtitle">Leave a memory of water in the city.</p>
    </header>

    <section class="input-area">
      <div class="place-fields">
        <div class="place-field">
          <label for="city-input">City</label>
          <input type="text" id="city-input" placeholder="Hồ Chí Minh" autocomplete="off" />
        </div>
        <div class="place-field">
          <label for="country-input">Country</label>
          <input type="text" id="country-input" placeholder="Vietnam" autocomplete="off" />
        </div>
      </div>

      <div class="word-grid" id="word-grid">
        <!-- 12 word boxes generated by main.ts -->
      </div>

      <p class="lang-hint">You may type in any language — Korean, Vietnamese, English, or your own.</p>

      <button id="translate-btn" disabled>Translate to strip</button>
    </section>

    <section class="apparatus-area">
      <canvas id="strip-canvas"></canvas>
      <div class="controls">
        <button id="play-pause-btn" class="brass-btn" disabled aria-label="Play">
          <svg class="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="3" width="4" height="18"/><rect x="14" y="3" width="4" height="18"/></svg>
        </button>
        <div class="strip-meta" id="strip-meta"></div>
      </div>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
