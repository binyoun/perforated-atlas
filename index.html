<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perforated Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      color: #D4C4A0;
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      padding: 0;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid #1E1A12;
      padding-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #8B7A50;
      margin: 0;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #5A4A30;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }

    .input-area {
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      background: #0F0D08;
      border: 1px solid #2A2318;
      border-radius: 2px;
      color: #C8B880;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: #5A4A30;
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }

    .char-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #3A3020;
    }

    #translate-btn {
      background: none;
      border: 1px solid #5A4A30;
      color: #8B7A50;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      cursor: pointer;
      border-radius: 1px;
    }

    #translate-btn:hover {
      border-color: #8B7A50;
      color: #C8A840;
    }

    .apparatus-area {
      position: relative;
    }

    #strip-canvas {
      width: 100%;
      height: 420px;
      display: block;
      border: 1px solid #1E1A12;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .brass-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(#D4A820, #7A5C10);
      border: 1px solid #B8860B;
      box-shadow: 0 0 12px rgba(180, 120, 20, 0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brass-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .brass-btn:not(:disabled):hover {
      box-shadow: 0 0 20px rgba(200, 150, 30, 0.3);
    }

    .brass-btn svg {
      width: 16px;
      height: 16px;
      fill: #F0E0A0;
    }

    .strip-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #4A3A20;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Perforated Atlas</h1>
      <p class="subtitle">Leave a memory of water in the city.</p>
    </header>

    <section class="input-area">
      <textarea id="memory-input" placeholder="Type a memory of water in the city…" maxlength="280" rows="3"></textarea>
      <div class="input-footer">
        <span class="char-count"><span id="char-count">0</span> / 280</span>
        <button id="translate-btn">Translate to strip</button>
      </div>
    </section>

    <section class="apparatus-area">
      <canvas id="strip-canvas"></canvas>
      <div class="controls">
        <button id="play-pause-btn" class="brass-btn" disabled aria-label="Play">
          <svg class="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="3" width="4" height="18"/><rect x="14" y="3" width="4" height="18"/></svg>
        </button>
        <div class="strip-meta" id="strip-meta"></div>
      </div>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
